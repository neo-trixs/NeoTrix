      <rect x="86" y="44" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#06b6d4" stroke-width="0.8"/>
      <rect x="162" y="44" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#06b6d4" stroke-width="0.8"/>
      <rect x="238" y="44" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#06b6d4" stroke-width="0.6"/>
      <!-- M row -->
