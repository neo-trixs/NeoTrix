      <rect x="86" y="124" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="162" y="124" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.8"/>
      <rect x="238" y="124" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="314" y="124" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.8"/>
      <rect x="390" y="124" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="466" y="124" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.8"/>
      <rect x="542" y="124" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.6"/>
      <!-- R2 row -->
      <rect x="10" y="162" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="86" y="162" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.8"/>
      <rect x="162" y="162" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="238" y="162" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="314" y="162" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="390" y="162" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.8"/>
      <rect x="466" y="162" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#8b5cf6" stroke-width="0.6"/>
      <rect x="542" y="162" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#8b5cf6" stroke-width="0.8"/>
      <!-- PL row -->
      <rect x="10" y="200" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#f59e0b" stroke-width="0.8"/>
      <rect x="86" y="200" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#f59e0b" stroke-width="0.6"/>
      <rect x="162" y="200" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#f59e0b" stroke-width="0.6"/>
      <rect x="238" y="200" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#f59e0b" stroke-width="0.8"/>
      <rect x="314" y="200" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#f59e0b" stroke-width="0.6"/>
      <rect x="390" y="200" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#f59e0b" stroke-width="0.8"/>
      <rect x="466" y="200" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#f59e0b" stroke-width="0.6"/>
      <rect x="542" y="200" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#f59e0b" stroke-width="0.8"/>
      <!-- M row -->
      <rect x="10" y="240" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#ec4899" stroke-width="0.8"/>
      <rect x="86" y="240" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#ec4899" stroke-width="0.6"/>
      <rect x="162" y="240" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#ec4899" stroke-width="0.8"/>
      <rect x="238" y="240" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#ec4899" stroke-width="0.6"/>
      <rect x="314" y="240" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#ec4899" stroke-width="0.8"/>
      <rect x="390" y="240" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#ec4899" stroke-width="0.6"/>
      <rect x="466" y="240" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#ec4899" stroke-width="0.8"/>
      <rect x="542" y="240" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#ec4899" stroke-width="0.6"/>
