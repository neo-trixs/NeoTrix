    <!-- Cross group data bus (neural signal traces) -->
    <g opacity="0.12">
      <line x1="94" y1="15" x2="94" y2="51" stroke="#c084fc" stroke-width="0.5" stroke-dasharray="1 2"/>
      <line x1="170" y1="15" x2="170" y2="91" stroke="#c084fc" stroke-width="0.5" stroke-dasharray="1 2"/>
      <line x1="246" y1="91" x2="246" y2="131" stroke="#22c55e" stroke-width="0.4" stroke-dasharray="1 2"/>
      <line x1="170" y1="131" x2="170" y2="207" stroke="#8b5cf6" stroke-width="0.4" stroke-dasharray="1 2"/>
      <line x1="94" y1="169" x2="94" y2="247" stroke="#8b5cf6" stroke-width="0.4" stroke-dasharray="1 2"/>
      <line x1="398" y1="131" x2="398" y2="207" stroke="#8b5cf6" stroke-width="0.4" stroke-dasharray="1 2"/>
      <line x1="314" y1="207" x2="314" y2="247" stroke="#f59e0b" stroke-width="0.4" stroke-dasharray="1 2"/>
      <line x1="466" y1="247" x2="466" y2="283" stroke="#ec4899" stroke-width="0.4" stroke-dasharray="1 2"/>

      <!-- Diagonal bridging connections -->
      <line x1="170" y1="51" x2="238" y2="91" stroke="#7c3aed" stroke-width="0.3" stroke-dasharray="1 3"/>
      <line x1="94" y1="131" x2="162" y2="163" stroke="#a855f7" stroke-width="0.3" stroke-dasharray="1 3"/>
      <line x1="390" y1="131" x2="314" y2="163" stroke="#3b82f6" stroke-width="0.3" stroke-dasharray="1 3"/>
      <line x1="238" y1="207" x2="170" y2="247" stroke="#c084fc" stroke-width="0.3" stroke-dasharray="1 3"/>
    </g>
