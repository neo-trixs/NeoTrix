  <!-- Legend panel (etched on die) -->
  <g transform="translate(410, 64)">
    <rect x="0" y="0" width="280" height="180" rx="6" fill="none" stroke="#2d0a55" stroke-width="0.5"/>
    <text x="14" y="20" fill="#66508a" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Crystal State Groups</text>
    <rect x="14" y="30" width="8" height="8" rx="1.5" fill="#c084fc" opacity="0.5"/>
    <text x="28" y="38" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Perception · 8 states</text>
    <rect x="14" y="46" width="8" height="8" rx="1.5" fill="#06b6d4" opacity="0.5"/>
    <text x="28" y="54" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Attention · 4 states</text>
    <rect x="14" y="62" width="8" height="8" rx="1.5" fill="#22c55e" opacity="0.5"/>
    <text x="28" y="70" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Memory · 8 states</text>
    <rect x="14" y="78" width="8" height="8" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
    <text x="28" y="86" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Reasoning · 16 states</text>
    <rect x="14" y="94" width="8" height="8" rx="1.5" fill="#f59e0b" opacity="0.5"/>
    <text x="28" y="102" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Planning · 8 states</text>
    <rect x="14" y="110" width="8" height="8" rx="1.5" fill="#ec4899" opacity="0.5"/>
    <text x="28" y="118" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Meta · 8 states</text>
    <rect x="14" y="126" width="8" height="8" rx="1.5" fill="#ef4444" opacity="0.5"/>
    <text x="28" y="134" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Action · 4 states</text>
    <rect x="14" y="142" width="8" height="8" rx="1.5" fill="#6b7280" opacity="0.4"/>
    <text x="28" y="150" fill="#8870aa" font-family="system-ui,sans-serif" font-size="9">Default · 4 states</text>
    <line x1="14" y1="162" x2="266" y2="162" stroke="#2d0a55" stroke-width="0.3"/>
    <text x="14" y="176" fill="#66508a" font-family="system-ui,sans-serif" font-size="9">Topology: invariant E8 lattice</text>
  </g>

  <!-- Bottom die traces -->
  <path d="M100 380 Q200 392 360 388 Q520 384 620 380" stroke="#a855f7" stroke-width="0.3" opacity="0.08" fill="none"/>
</svg>
