      <rect x="86" y="84" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#22c55e" stroke-width="0.8"/>
      <rect x="162" y="84" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#22c55e" stroke-width="0.6"/>
      <rect x="238" y="84" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#22c55e" stroke-width="0.8"/>
      <rect x="314" y="84" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#22c55e" stroke-width="0.6"/>
      <rect x="390" y="84" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#22c55e" stroke-width="0.6"/>
