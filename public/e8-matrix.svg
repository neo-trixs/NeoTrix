      <rect x="86" y="278" width="14" height="14" rx="2" fill="url(#cellOpp)" stroke="#ef4444" stroke-width="0.6"/>
      <rect x="162" y="278" width="14" height="14" rx="2" fill="url(#cellOn)" stroke="#ef4444" stroke-width="0.8"/>
      <rect x="238" y="278" width="14" height="14" rx="2" fill="url(#cellOff)" stroke="#ef4444" stroke-width="0.6"/>
