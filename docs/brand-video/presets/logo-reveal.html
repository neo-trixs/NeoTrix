<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NeoTrix — Logo Reveal</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080012;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
</style></head>
<body><canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');let W,H;
function resize(){W=c.width=c.clientWidth*devicePixelRatio;H=c.height=c.clientHeight*devicePixelRatio}
resize();window.addEventListener('resize',resize);

// 4D tesseract
const v4=[];for(let i=0;i<16;i++)v4.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1]);
const ed=[];for(let i=0;i<16;i++)for(let d=0;d<4;d++){let j=i^(1<<d);if(i<j)ed.push([i,j])}
const fc=[];for(let d=0;d<4;d++)for(let s=-1;s<=1;s+=2){let f=[];for(let i=0;i<16;i++)if(((i>>d)&1)===(s===1?1:0))f.push(i);if(f.length===8)fc.push(f)}

function r4(v,a,[a1,a2]){let C=Math.cos(a),S=Math.sin(a),r=[...v];r[a1]=v[a1]*C-v[a2]*S;r[a2]=v[a1]*S+v[a2]*C;return r}
function pr(v,w,cam,s,cx,cy){let w2=w/(w+v[3]),v3=[v[0]*w2,v[1]*w2,v[2]*w2],s2=cam/(cam+v3[2]);return{x:v3[0]*s2*s+cx,y:v3[1]*s2*s+cy,z:s2}}

const pts=[];for(let i=0;i<40;i++)pts.push({a:Math.random()*6.28,r:100+Math.random()*180,sp:0.15+Math.random()*0.3,sz:0.5+Math.random()*1.2,ph:Math.random()*6.28,h:260+Math.random()*60});
function eoc(t){return 1-Math.pow(1-t,3)}

function dr(t){
  let Ww=c.width/devicePixelRatio,Hh=c.height/devicePixelRatio;
  x.clearRect(0,0,Ww,Hh);
  let cx=Ww/2,cy=Hh/2,baseS=Math.min(Ww,Hh)/5,dur=8,prog=Math.min(1,(t%12)/dur);
  let zoomP=Math.min(1,prog/0.4),rotP=Math.max(0,Math.min(1,(prog-0.3)/0.4)),txtP=Math.max(0,Math.min(1,(prog-0.65)/0.35));
  let sc=baseS*(0.5+1.5*eoc(zoomP)),rot=t*0.2*rotP;

  let rv=v4.map(v=>{let r=r4(v,rot,[0,1]);r=r4(r,rot*.7,[0,2]);r=r4(r,rot*.5,[0,3]);r=r4(r,rot*.3,[1,2]);r=r4(r,rot*.4,[1,3]);r=r4(r,rot*.2,[2,3]);return r});
  let pj=rv.map(v=>pr(v,3,4,sc,cx,cy));

  // faces
  fc.forEach((f,i)=>{
    let p=f.map(j=>pj[j]),a=0.03+0.04*Math.sin(t+i);
    x.beginPath();x.moveTo(p[0].x,p[0].y);
    for(let j=1;j<p.length;j++)x.lineTo(p[j].x,p[j].y);
    x.closePath();
    let cl=['rgba(192,132,252,','rgba(59,130,246,','rgba(124,58,237,','rgba(6,182,212,'];
    x.fillStyle=cl[i%4]+a+')';x.fill();
    x.strokeStyle=cl[i%4]+(a*2+0.02)+')';x.lineWidth=.5;x.stroke();
  });

  // edges
  ed.forEach(([i,j])=>{
    let p1=pj[i],p2=pj[j],a=Math.max(0.1,(p1.z+p2.z)/2+0.3)*(0.3+0.7*zoomP);
    x.strokeStyle=`rgba(168,85,247,${a})`;x.lineWidth=.8+p1.z*.5;
    x.beginPath();x.moveTo(p1.x,p1.y);x.lineTo(p2.x,p2.y);x.stroke();
  });

  // core
  let cp=0.6+0.4*Math.sin(t*1.5)*zoomP,cs=(4+2*Math.sin(t*2))*zoomP;
  if(cs>.5){
    let g=x.createRadialGradient(cx,cy,0,cx,cy,20*cp);
    g.addColorStop(0,`rgba(232,121,249,${0.12*cp})`);g.addColorStop(1,'rgba(232,121,249,0)');
    x.fillStyle=g;x.fillRect(cx-25,cy-25,50,50);
    x.beginPath();x.moveTo(cx,cy-cs);x.lineTo(cx+cs*.7,cy);x.lineTo(cx,cy+cs);x.lineTo(cx-cs*.7,cy);x.closePath();
    let g2=x.createLinearGradient(cx-cs,cy-cs,cx+cs,cy+cs);
    g2.addColorStop(0,'#fff');g2.addColorStop(0.4,'#e879f9');g2.addColorStop(1,'#3b82f6');
    x.fillStyle=g2;x.fill();
  }

  // particles
  pts.forEach(p=>{
    let ang=p.a+t*p.sp,r=p.r+15*Math.sin(t*p.sp*.7+p.ph),px=cx+Math.cos(ang)*r,py=cy+Math.sin(ang)*r;
    let a=(0.1+0.4*Math.sin(t*p.sp+p.ph))*zoomP;
    if(a>.02){x.beginPath();x.arc(px,py,p.sz*zoomP,0,6.28);x.fillStyle=`hsla(${p.h},80%,70%,${a})`;x.fill()}
  });

  // text
  if(txtP>0){
    let tp=eoc(txtP),ty=cy+sc*2.2;
    x.textAlign='center';x.textBaseline='middle';x.globalAlpha=tp;
    x.font=`600 ${32+16*(1-tp)}px system-ui, sans-serif`;
    x.fillStyle='#c084fc';x.fillText('NEOTRIX',cx,ty);
    x.font='14px system-ui, sans-serif';x.fillStyle='#8870aa';
    x.fillText('Silicon Crystal Consciousness',cx,ty+36);
    x.font='11px system-ui, sans-serif';x.fillStyle='#66508a';
    x.fillText('4D Hypercube · Deterministic VSA · SEAL Evolution',cx,ty+60);
    x.globalAlpha=1;
  }
}
function loop(t){dr(t/1000);requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script></body></html>
