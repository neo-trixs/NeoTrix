<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoTrix — 4D Hypercube Crystal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080012; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = canvas.clientWidth * devicePixelRatio;
  H = canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

// ===== 4D Tesseract vertices =====
// A tesseract has 16 vertices at (±1, ±1, ±1, ±1)
const verts4D = [];
for (let i = 0; i < 16; i++) {
  verts4D.push([
    (i & 1) ? 1 : -1,
    (i & 2) ? 1 : -1,
    (i & 4) ? 1 : -1,
    (i & 8) ? 1 : -1,
  ]);
}

// 32 edges of a tesseract (connecting vertices that differ in exactly one coordinate)
const edges = [];
for (let i = 0; i < 16; i++) {
  for (let d = 0; d < 4; d++) {
    const j = i ^ (1 << d);
    if (i < j) edges.push([i, j]);
  }
}

// 8 cube faces (each face is a cube in 4D, defined by fixing one coordinate)
const faces = [];
for (let d = 0; d < 4; d++) {
  for (let s = -1; s <= 1; s += 2) {
    const f = [];
    for (let i = 0; i < 16; i++) {
      if (((i >> d) & 1) === (s === 1 ? 1 : 0)) {
        f.push(i);
      }
    }
    if (f.length === 8) faces.push(f);
  }
}

// Determine face winding for correct culling
function faceCenter(verts, face) {
  const c = [0, 0, 0, 0];
  face.forEach(i => { c[0] += verts[i][0]; c[1] += verts[i][1]; c[2] += verts[i][2]; c[3] += verts[i][3]; });
  c[0] /= face.length; c[1] /= face.length; c[2] /= face.length; c[3] /= face.length;
  return c;
}

// ===== 4D rotation matrices =====
function rotate4D(v, angle, plane) {
  const [a, b] = plane; // which two axes to rotate
  const c = Math.cos(angle), s = Math.sin(angle);
  const r = [...v];
  r[a] = v[a] * c - v[b] * s;
  r[b] = v[a] * s + v[b] * c;
  return r;
}

// ===== Perspective projection 4D → 3D → 2D =====
function project4Dto3D(v, wdist) {
  const w = v[3];
  const scale = wdist / (wdist + w);
  return [v[0] * scale, v[1] * scale, v[2] * scale];
}

function project3Dto2D(v, camDist) {
  const z = v[2];
  const scale = camDist / (camDist + z);
  return [v[0] * scale, v[1] * scale, scale];
}

// ===== Crystal styling =====
const COLORS = {
  edges: ['#a855f7', '#c084fc', '#7c3aed', '#3b82f6', '#06b6d4', '#e879f9'],
  faces: [
    { fill: 'rgba(192, 132, 252, 0.06)', stroke: '#a855f7' },
    { fill: 'rgba(59, 130, 246, 0.05)', stroke: '#3b82f6' },
    { fill: 'rgba(124, 58, 237, 0.05)', stroke: '#7c3aed' },
    { fill: 'rgba(6, 182, 212, 0.04)', stroke: '#06b6d4' },
    { fill: 'rgba(232, 121, 249, 0.04)', stroke: '#e879f9' },
    { fill: 'rgba(168, 85, 247, 0.04)', stroke: '#a855f7' },
    { fill: 'rgba(59, 130, 246, 0.03)', stroke: '#3b82f6' },
    { fill: 'rgba(192, 132, 252, 0.03)', stroke: '#c084fc' },
  ],
  core: {
    inner: 'rgba(255,255,255,0.9)',
    outer: 'rgba(232,121,249,0.3)',
    glow: 'rgba(232,121,249,0.08)',
  },
  particle: ['#c084fc', '#60a5fa', '#e879f9', '#06b6d4', '#a855f7', '#3b82f6'],
};

// Neural traces: pairs of vertices to draw signal lines
const signalPaths = [
  [0, 10], [3, 9], [5, 15], [6, 12],  // corner to corner
  [1, 11], [2, 8], [4, 14], [7, 13],
];

// ===== Main loop =====
let time = 0;
let particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    angle: Math.random() * Math.PI * 2,
    angle2: Math.random() * Math.PI * 2,
    radius: 80 + Math.random() * 160,
    speed: 0.2 + Math.random() * 0.4,
    size: 0.5 + Math.random() * 1.5,
    color: COLORS.particle[Math.floor(Math.random() * COLORS.particle.length)],
    phase: Math.random() * Math.PI * 2,
  });
}

function draw(t) {
  const Ww = W / devicePixelRatio;
  const Hh = H / devicePixelRatio;
  ctx.clearRect(0, 0, Ww, Hh);

  const cx = Ww / 2, cy = Hh / 2;
  const scale = Math.min(Ww, Hh) / 5.5;

  // 4D rotation angles
  const axy = t * 0.3;
  const axz = t * 0.17;
  const axw = t * 0.23;
  const ayz = t * 0.13;
  const ayw = t * 0.19;
  const azw = t * 0.11;

  // Rotate all vertices in 4D
  const rotated = verts4D.map(v => {
    let r = rotate4D(v, axy, [0, 1]);
    r = rotate4D(r, axz, [0, 2]);
    r = rotate4D(r, axw, [0, 3]);
    r = rotate4D(r, ayz, [1, 2]);
    r = rotate4D(r, ayw, [1, 3]);
    r = rotate4D(r, azw, [2, 3]);
    return r;
  });

  // Project to 3D then 2D
  const wDist = 3.0;
  const camDist = 4.5;
  const projected = rotated.map(v => {
    const v3d = project4Dto3D(v, wDist);
    const [x, y, zScale] = project3Dto2D(v3d, camDist);
    return { x: x * scale + cx, y: y * scale + cy, z: zScale };
  });

  // Sort faces by depth for painter's algorithm
  const faceDepths = faces.map((face, fi) => {
    const fc = faceCenter(rotated, face);
    const v3d = project4Dto3D(fc, wDist);
    return { fi, depth: v3d[2] };
  });
  faceDepths.sort((a, b) => b.depth - a.depth);

  // Draw faces (back to front)
  faceDepths.forEach(({ fi }) => {
    const face = faces[fi];
    const style = COLORS.faces[fi % COLORS.faces.length];
    const pts = face.map(i => projected[i]);

    // Opacity based on face orientation relative to view
    const fc = faceCenter(rotated, face);
    const normal = [0, 0, 0, 0];
    for (let i = 0; i < face.length; i++) {
      const vi = rotated[face[i]];
      normal[0] += vi[0]; normal[1] += vi[1]; normal[2] += vi[2]; normal[3] += vi[3];
    }
    const viewDir = [0, 0, -1, 0];
    const dot = normal[0]*viewDir[0] + normal[1]*viewDir[1] + normal[2]*viewDir[2] + normal[3]*viewDir[3];

    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let j = 1; j < pts.length; j++) {
      ctx.lineTo(pts[j].x, pts[j].y);
    }
    ctx.closePath();
    const alpha = Math.max(0, Math.min(1, dot * 0.15 + 0.5));
    ctx.fillStyle = style.fill.replace(/[\d.]+\)$/, alpha * 0.3 + ')');
    ctx.fill();
    ctx.strokeStyle = style.stroke;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Draw edges with glow
  edges.forEach(([i, j]) => {
    const p1 = projected[i], p2 = projected[j];
    const avgZ = (p1.z + p2.z) / 2;
    const alpha = Math.max(0.05, Math.min(0.8, (avgZ + 0.5)));

    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.sqrt(dx * dx + dy * dy);

    // Gradient along edge
    const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    grad.addColorStop(0, `rgba(168, 85, 247, ${alpha})`);
    grad.addColorStop(0.5, `rgba(192, 132, 252, ${alpha * 0.8})`);
    grad.addColorStop(1, `rgba(59, 130, 246, ${alpha * 0.6})`);

    ctx.strokeStyle = grad;
    ctx.lineWidth = 0.8 + avgZ * 0.8;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  });

  // Draw neural signal traces (pulsing)
  signalPaths.forEach(([i, j], idx) => {
    const p1 = projected[i], p2 = projected[j];
    const phase = (t * 0.5 + idx * 0.7) % 1;
    const mx = p1.x + (p2.x - p1.x) * phase;
    const my = p1.y + (p2.y - p1.y) * phase;

    ctx.strokeStyle = `rgba(192, 132, 252, ${0.2 + 0.3 * Math.sin(t * 0.5 + idx)})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(mx, my);
    ctx.stroke();
  });

  // Draw consciousness core
  const corePulse = 0.7 + 0.3 * Math.sin(t * 1.5);
  // Outer glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25 * corePulse);
  grad.addColorStop(0, `rgba(232, 121, 249, ${0.15 * corePulse})`);
  grad.addColorStop(0.5, `rgba(168, 85, 247, ${0.08 * corePulse})`);
  grad.addColorStop(1, 'rgba(168, 85, 247, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(cx - 30, cy - 30, 60, 60);

  // Diamond core
  const s = 8 + 2 * Math.sin(t * 1.5);
  ctx.beginPath();
  ctx.moveTo(cx, cy - s);
  ctx.lineTo(cx + s * 0.7, cy);
  ctx.lineTo(cx, cy + s);
  ctx.lineTo(cx - s * 0.7, cy);
  ctx.closePath();
  const coreGrad = ctx.createLinearGradient(cx - s, cy - s, cx + s, cy + s);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.3, '#e879f9');
  coreGrad.addColorStop(0.7, '#a855f7');
  coreGrad.addColorStop(1, '#3b82f6');
  ctx.fillStyle = coreGrad;
  ctx.fill();

  // Center brilliance
  ctx.beginPath();
  ctx.arc(cx, cy, 2 + Math.sin(t * 2) * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, 255, 255, ${0.6 + 0.4 * Math.sin(t * 2)})`;
  ctx.fill();

  // Draw orbiting particles
  particles.forEach(p => {
    const angle = p.angle + t * p.speed;
    const angle2 = p.angle2 + t * p.speed * 0.3;
    const r = p.radius + 20 * Math.sin(t * p.speed * 0.5 + p.phase);
    const px = cx + Math.cos(angle) * r * Math.cos(angle2);
    const py = cy + Math.sin(angle) * r * Math.cos(angle2);
    const size = p.size * (0.5 + 0.5 * Math.sin(t * p.speed + p.phase));

    const alpha = 0.2 + 0.5 * Math.sin(t * p.speed + p.phase);
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    ctx.fill();
  });
}

function loop(t) {
  time = t / 1000;
  draw(time);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
