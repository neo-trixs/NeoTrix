base64 = "0.22"
url = "2"
anyhow = "1"
chrono = { workspace = true }
sha2 = "0.10"
uuid = { workspace = true }
md-5 = "0.10"
hmac = "0.12"
aes = "0.8"
cfb-mode = "0.8"
