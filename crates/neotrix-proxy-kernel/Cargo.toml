shadowsocks = { version = "1.24" }
hysteria2 = "0.1"
rustls = "0.23"
rustls-pki-types = "1"
webpki-roots = "0.26"
tokio = { workspace = true, features = ["full"] }
tokio-rustls = "0.26"
serde = { workspace = true, features = ["derive"] }
