# git-cliff changelog configuration for NeoTrix
# Used by .github/workflows/release.yml to generate release notes.
# Reference: https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.breaking %} (BREAKING){% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
---
*This changelog was auto-generated by [git-cliff](https://git-cliff.org).*
"""
postprocessors = []

[git]
conventional_commits = true
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Chores" },
    { message = "^ci", group = "CI/CD" },
    { message = ".*", group = "Other", default_scope = "other" },
]
filter_commits = false
