name: NeoTrix Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly: Monday 6AM

env:
  CARGO_TERM_COLOR: always

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Build project
        run: cargo build --lib -p neotrix

      - name: Run security scanner tests
        run: cargo test -p neotrix --lib -- scanning 2>&1 | tee scan-test-output.txt

      - name: Run security scan
        id: scan
        run: |
          cargo run -p neotrix -- security-scan --target . --ci-mode 2>&1 | tee scan-results.txt || true

      - name: Upload scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-scan-results
          path: scan-results.txt
          retention-days: 30

      - name: Check for critical findings
        run: |
          if grep -qi "critical\|error" scan-results.txt 2>/dev/null; then
            echo "::error::Critical or Error findings detected in security scan"
            exit 1
          fi
          echo "Security scan passed"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sLO https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks secret scan
        run: |
          gitleaks detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks-report.json --verbose 2>&1 | tee gitleaks-output.txt || true

      - name: Upload gitleaks results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

      - name: Check for leaked secrets
        run: |
          if grep -qi '"Severity":\s*"HIGH"\|"Severity":\s*"CRITICAL"' gitleaks-report.json 2>/dev/null; then
            echo "::error::High or Critical severity secrets detected"
            exit 1
          fi
          echo "Gitleaks scan passed"

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          mkdir -p sbom
          cargo cyclonedx --all --format json --output-dir sbom/

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: neotrix-sbom
          path: sbom/
          retention-days: 90

      - name: Verify SBOM
        run: |
          if [ -f sbom/neotrix-sbom.json ]; then
            echo "SBOM generated successfully"
            python3 -c "import json; d=json.load(open('sbom/neotrix-sbom.json')); print(f'Components: {len(d.get(\"components\",[]))}')"
          else
            echo "SBOM file not found"
            ls -la sbom/
            exit 1
          fi
