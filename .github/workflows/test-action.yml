name: Test neotrix-action

on:
  push:
    paths:
      - '.github/actions/neotrix-action/**'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - '.github/actions/neotrix-action/**'
  workflow_dispatch:

jobs:
  test-action:
    name: self-test neotrix-action
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup dummy repo
        run: |
          mkdir -p /tmp/ntrix-test && cd /tmp/ntrix-test
          git init -q
          git config user.email "ci@neotrix.ai"
          git config user.name "neotrix-ci"
          mkdir -p src
          cat > src/lib.rs << 'EOF'
          pub fn add(a: i32, b: i32) -> i32 { a + b }
          EOF
          git add -A && git commit -qm "init"

      - name: Run neotrix-action (dry)
        id: run
        uses: ./.github/actions/neotrix-action
        with:
          prompt: 'List the function names in src/lib.rs'
          api-key: ${{ secrets.NEOTRIX_TEST_API_KEY || 'sk-dummy' }}
          provider: openai
          max-budget-usd: '0.01'
          working-directory: /tmp/ntrix-test
        continue-on-error: true

      - name: Show output
        if: always()
        run: |
          echo "Exit: ${{ steps.run.outcome }}"
          echo "--- output ---"
          echo "${{ steps.run.outputs }}"
