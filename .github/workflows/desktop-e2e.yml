name: Desktop E2E

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/frontend/**'
      - 'src-tauri/src/**'
      - '.github/workflows/desktop-e2e.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-tauri/frontend/package-lock.json

      - name: Install npm deps
        working-directory: src-tauri/frontend
        run: npm ci || npm install

      - name: Install Playwright browsers
        working-directory: src-tauri/frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend (sanity)
        working-directory: src-tauri/frontend
        run: npm run build

      - name: Run Playwright E2E
        working-directory: src-tauri/frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:1420
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src-tauri/frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: src-tauri/frontend/test-results
          retention-days: 7
          if-no-files-found: ignore
