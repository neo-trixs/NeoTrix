name: 'NeoTrix Action'
description: 'Run NeoTrix AI coding agent in CI/CD'
author: 'NeoTrix'

inputs:
  prompt:
    description: 'The task prompt for NeoTrix'
    required: true
  api-key:
    description: 'LLM API key (e.g. OpenAI, Anthropic)'
    required: true
  model:
    description: 'LLM model to use'
    required: false
    default: ''
  provider:
    description: 'LLM provider (openai, anthropic, etc.)'
    required: false
    default: 'openai'
  max-budget-usd:
    description: 'Maximum budget in USD'
    required: false
    default: ''
  working-directory:
    description: 'Working directory'
    required: false
    default: ${{ github.workspace }}
  version:
    description: 'NeoTrix version to use (default: latest)'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install NeoTrix
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          curl -fsSL https://raw.githubusercontent.com/neotrix/neotrix/main/scripts/install.sh | bash
        else
          curl -fsSL https://raw.githubusercontent.com/neotrix/neotrix/main/scripts/install.sh | VERSION=$VERSION bash
        fi
        echo "$HOME/.neotrix/bin" >> $GITHUB_PATH

    - name: Configure Provider
      shell: bash
      env:
        NEOTRIX_PROVIDER: ${{ inputs.provider }}
        NEOTRIX_API_KEY: ${{ inputs.api-key }}
      run: |
        mkdir -p ~/.config/neotrix
        cat > ~/.config/neotrix/config.toml << EOF
        provider = "$NEOTRIX_PROVIDER"
        EOF

    - name: Run NeoTrix
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NEOTRIX_API_KEY: ${{ inputs.api-key }}
        NEOTRIX_MAX_BUDGET_USD: ${{ inputs.max-budget-usd }}
      run: |
        ARGS="exec"
        if [ -n "${{ inputs.model }}" ]; then
          ARGS="$ARGS --model ${{ inputs.model }}"
        fi
        if [ -n "${{ inputs.max-budget-usd }}" ]; then
          ARGS="$ARGS --max-budget-usd ${{ inputs.max-budget-usd }}"
        fi
        ARGS="$ARGS --json \"${{ inputs.prompt }}\""
        neotrix $ARGS

branding:
  icon: 'terminal'
  color: 'purple'
