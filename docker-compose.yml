version: '3.8'

services:
  neotrix:
    build: .
    image: neotrix/neotrix:latest
    container_name: neotrix
    ports:
      - "3000:3000"
    volumes:
      - neotrix_data:/home/neotrix/.neotrix
      - ./:/workspace
    environment:
      - NEOTRIX_PROVIDER=${NEOTRIX_PROVIDER:-openai}
      - NEOTRIX_API_KEY=${NEOTRIX_API_KEY:-}
      - NEOTRIX_BASE_URL=${NEOTRIX_BASE_URL:-}
      - NEOTRIX_MODEL=${NEOTRIX_MODEL:-}
    command: ["serve", "--addr", "0.0.0.0:3000"]
    stdin_open: true
    tty: true
    restart: unless-stopped

  kb-crawl:
    build:
      context: .
      dockerfile: Dockerfile
      target: kb-crawl
    image: neotrix/neotrix-kb-crawl:latest
    container_name: neotrix-kb-crawl
    volumes:
      - neotrix_data:/home/neotrix/.neotrix
    environment:
      - NEOTRIX_PROVIDER=${NEOTRIX_PROVIDER:-openai}
      - NEOTRIX_API_KEY=${NEOTRIX_API_KEY:-}
      - NEOTRIX_EMBEDDING_API_KEY=${NEOTRIX_EMBEDDING_API_KEY:-}
    command: ["daemon", "--evolve"]
    restart: unless-stopped

volumes:
  neotrix_data:
