<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoTrix Web UI</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-hover: #30363d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --success: #3fb950;
  --warning: #d29922;
  --danger: #f85149;
  --chat-user: #1f6feb;
  --chat-assistant: #238636;
  --sidebar-width: 260px;
  --right-panel-width: 340px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; font-size: 14px; }
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.sidebar-header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: background 0.15s; display: flex; align-items: center; justify-content: space-between; }
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-tertiary); border-left: 3px solid var(--accent); }
.session-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.session-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.session-actions { display: none; gap: 4px; }
.session-item:hover .session-actions { display: flex; }
.session-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 2px 4px; border-radius: 3px; font-size: 12px; }
.session-actions button:hover { color: var(--text-primary); background: var(--bg-hover); }
.sidebar-actions { padding: 8px; display: flex; gap: 4px; }
.sidebar-actions button { flex: 1; padding: 8px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.15s; }
.sidebar-actions button:hover { background: var(--bg-hover); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.main-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.main-header .title { font-size: 14px; color: var(--text-secondary); }
.main-header .controls { display: flex; gap: 8px; align-items: center; }
.main-header .controls button, .main-header .controls select { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 6px; cursor: pointer; font-size: 12px; }
.main-header .controls button:hover { background: var(--bg-hover); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.online { background: var(--success); }
.status-dot.offline { background: var(--danger); }
.status-dot.busy { background: var(--warning); }

/* Chat area */
.chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.message { max-width: 85%; padding: 12px 16px; border-radius: 10px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.message.user { align-self: flex-end; background: var(--chat-user); color: #fff; border-bottom-right-radius: 4px; }
.message.assistant { align-self: flex-start; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.message.system { align-self: center; background: transparent; color: var(--text-secondary); font-size: 12px; text-align: center; }
.message .msg-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; text-align: right; }
.message.assistant .msg-time { color: var(--text-secondary); }

/* Input area */
.input-area { flex-shrink: 0; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-secondary); }
.input-row { display: flex; gap: 8px; }
.input-row textarea { flex: 1; padding: 12px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 8px; resize: none; font-family: inherit; font-size: 14px; min-height: 48px; max-height: 120px; outline: none; }
.input-row textarea:focus { border-color: var(--accent); }
.input-row button { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
.input-row button:hover { background: var(--accent-hover); }
.input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Right Panel */
.right-panel { width: var(--right-panel-width); background: var(--bg-secondary); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-tertiary); }
.panel-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 12px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all 0.15s; }
.panel-tab:hover { color: var(--text-primary); }
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.panel-content { flex: 1; overflow-y: auto; padding: 12px; display: none; }
.panel-content.active { display: block; }

/* File tree */
.file-item { padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
.file-item:hover { background: var(--bg-hover); }
.file-item .icon { width: 16px; text-align: center; color: var(--text-secondary); }
.file-item .name { color: var(--text-primary); }
.file-item .name.folder { color: var(--accent); }
.file-children { padding-left: 20px; }

/* MCP tools */
.tool-item { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.tool-item .tool-name { color: var(--accent); font-weight: 500; }
.tool-item .tool-desc { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

/* Agent settings */
.settings-group { margin-bottom: 16px; }
.settings-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.settings-group input, .settings-group select { width: 100%; padding: 8px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 6px; font-size: 13px; }
.settings-group button { width: 100%; padding: 8px; margin-top: 8px; border: 1px solid var(--border); background: var(--accent); color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
.settings-group button:hover { background: var(--accent-hover); }
.settings-row { display: flex; gap: 8px; margin-top: 8px; }
.settings-row button { flex: 1; }
.status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
.status-badge.running { background: rgba(63,185,80,0.2); color: var(--success); }
.status-badge.stopped { background: rgba(139,148,158,0.2); color: var(--text-secondary); }

/* Knowledge sources */
.knowledge-item { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.knowledge-item .ks-name { color: var(--accent); font-weight: 500; }
.knowledge-item .ks-desc { color: var(--text-secondary); font-size: 12px; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal input, .modal textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 6px; font-size: 14px; }
.modal textarea { min-height: 100px; resize: vertical; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.modal-actions button { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-primary { background: var(--accent); color: #fff; border: none; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-hover); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* Responsive */
@media (max-width: 900px) {
  .right-panel { display: none; }
  .sidebar { width: 200px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Left Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span style="font-size:20px;">🧠</span>
      <h1>NeoTrix</h1>
    </div>
    <div class="sidebar-actions">
      <button onclick="createSession()">+ 新会话</button>
      <button onclick="showImportDialog()">导入</button>
    </div>
    <div class="sidebar-content" id="sessionList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <div class="title">
        <span class="status-dot online" id="brainStatus"></span>
        <span id="currentSessionName">默认会话</span>
        <span style="color:var(--text-secondary);font-size:12px;margin-left:8px;" id="brainStats"></span>
      </div>
      <div class="controls">
        <button onclick="exportCurrentSession()" title="导出会话">📥</button>
        <button onclick="clearChat()" title="清空对话">🗑️</button>
        <button onclick="toggleRightPanel()" title="切换面板">📂</button>
      </div>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="promptInput" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel" id="rightPanel">
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="files" onclick="switchTab('files')">文件</div>
      <div class="panel-tab" data-tab="tools" onclick="switchTab('tools')">工具</div>
      <div class="panel-tab" data-tab="settings" onclick="switchTab('settings')">设置</div>
      <div class="panel-tab" data-tab="knowledge" onclick="switchTab('knowledge')">知识</div>
    </div>
    <div class="panel-content active" id="tab-files">
      <div style="display:flex;gap:4px;margin-bottom:8px;">
        <input id="filePathInput" value="." placeholder="路径" style="flex:1;padding:6px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);border-radius:4px;font-size:12px;">
        <button onclick="loadFileTree()" style="padding:6px 12px;border:1px solid var(--border);background:var(--accent);color:#fff;border-radius:4px;cursor:pointer;">浏览</button>
      </div>
      <div id="fileTree"></div>
    </div>
    <div class="panel-content" id="tab-tools">
      <div id="mcpToolsList"><p style="color:var(--text-secondary);font-size:12px;">正在加载工具列表...</p></div>
    </div>
    <div class="panel-content" id="tab-settings">
      <div class="settings-group">
        <label>Provider ID</label>
        <select id="providerId"><option>openai</option><option>anthropic</option><option>gemini</option><option>ollama</option></select>
      </div>
      <div class="settings-group">
        <label>Model</label>
        <input id="providerModel" value="gpt-4o-mini">
      </div>
      <div class="settings-group">
        <label>API Key</label>
        <input id="providerKey" type="password">
      </div>
      <div class="settings-group">
        <label>Base URL (optional)</label>
        <input id="providerUrl" placeholder="https://api.openai.com/v1">
      </div>
      <div class="settings-group">
        <button onclick="saveProvider()">保存 Provider 配置</button>
      </div>
      <div class="settings-group">
        <button onclick="testProvider()">测试连接</button>
      </div>
      <div class="settings-group" style="border-top:1px solid var(--border);padding-top:12px;">
        <label>Agent 状态</label>
        <div id="agentStatusDisplay"><span class="status-badge stopped">stopped</span></div>
        <div class="settings-row">
          <button onclick="startAgent()">启动</button>
          <button onclick="stopAgent()">停止</button>
        </div>
      </div>
    </div>
    <div class="panel-content" id="tab-knowledge">
      <p style="color:var(--text-secondary);font-size:12px;margin-bottom:8px;">知识来源 (点击吸收):</p>
      <div id="knowledgeSourceList"></div>
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
        <label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px;">搜索知识:</label>
        <div style="display:flex;gap:4px;">
          <input id="knowledgeSearchInput" placeholder="搜索..." style="flex:1;padding:6px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);border-radius:4px;font-size:12px;">
          <button onclick="searchKnowledge()" style="padding:6px 12px;border:1px solid var(--border);background:var(--accent);color:#fff;border-radius:4px;cursor:pointer;">搜索</button>
        </div>
        <div id="knowledgeSearchResults" style="margin-top:8px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">标题</h2>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="modalConfirm" onclick="closeModal()">确认</button>
    </div>
  </div>
</div>

<script>
const API = '';
const brainSources = [
  {name:'HeroUI',desc:'UI Design — compound_composition, tailwind'},
  {name:'BaseUI',desc:'Accessibility — react_aria, a11y'},
  {name:'ArcUI',desc:'AI-native UI — semantic_layer, ai_native_states'},
  {name:'CortexUI',desc:'Semantic Layer — verification, semantic_layer'},
  {name:'AgenticDS',desc:'Quality Gates — quality_gates, verification'},
  {name:'DesignPhilosophy',desc:'Design System — figma, semantic_layer'},
];

let currentSessionId = 'default';
let sessions = [];
let messages = [];

function $(id) { return document.getElementById(id); }

async function apiFetch(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function addMessage(role, content) {
  const container = $('chatContainer');
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  const now = new Date();
  const timeStr = now.toLocaleTimeString();
  msg.innerHTML = content + `<div class="msg-time">${timeStr}</div>`;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function addSystemMessage(text) {
  addMessage('system', text);
}

// ── Brain ──
async function loadBrainStats() {
  const data = await apiFetch('GET', '/api/brain/stats');
  if (data.capability_sum != null) {
    $('brainStats').textContent = `cap: ${data.capability_sum.toFixed(3)} | mem: ${data.memory_count}`;
    const status = $('brainStatus');
    status.className = 'status-dot ' + (data.engine_active ? 'online' : 'online');
  }
}

async function absorbSource(name) {
  const data = await apiFetch('POST', '/api/brain/absorb', {source: name});
  if (data.absorbed != null) {
    addSystemMessage(`✅ Absorbed ${name} (total: ${data.absorbed})`);
    loadBrainStats();
  }
}

async function searchKnowledge() {
  const q = $('knowledgeSearchInput').value.trim();
  if (!q) return;
  const data = await apiFetch('GET', '/api/brain/knowledge/search?q=' + encodeURIComponent(q));
  const results = $('knowledgeSearchResults');
  if (Array.isArray(data) && data.length === 0) {
    results.innerHTML = '<p style="color:var(--text-secondary);font-size:12px;">无结果</p>';
    return;
  }
  results.innerHTML = (Array.isArray(data) ? data : []).map(r =>
    `<div class="knowledge-item"><div class="ks-name">${r.title || '?'}</div><div class="ks-desc">${r.content || ''}</div></div>`
  ).join('');
}

// ── Sessions ──
async function loadSessions() {
  const data = await apiFetch('GET', '/api/sessions');
  sessions = Array.isArray(data) ? data : [];
  renderSessions();
}

function renderSessions() {
  const list = $('sessionList');
  list.innerHTML = sessions.map(s => {
    const active = s.id === currentSessionId ? 'active' : '';
    const date = new Date(s.created * 1000);
    return `<div class="session-item ${active}" onclick="switchSession('${s.id}')">
      <div>
        <div class="session-name">${escHtml(s.name)}</div>
        <div class="session-meta">${s.message_count} 条 · ${date.toLocaleDateString()}</div>
      </div>
      <div class="session-actions">
        <button onclick="event.stopPropagation(); forkSession('${s.id}')" title="复制">📋</button>
        <button onclick="event.stopPropagation(); deleteSession('${s.id}')" title="删除">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) { return String(s).replace(/[&<>"]/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m;}); }

async function createSession() {
  showPrompt('新会话名称', '', async (name) => {
    if (!name) return;
    const data = await apiFetch('POST', '/api/sessions', {name});
    if (data.id) {
      currentSessionId = data.id;
      loadSessions();
      clearChat();
      addSystemMessage(`会话 "${data.name}" 已创建`);
    }
  });
}

async function switchSession(id) {
  const data = await apiFetch('POST', `/api/sessions/${id}/switch`);
  if (data.switched) {
    currentSessionId = id;
    const s = sessions.find(x => x.id === id);
    $('currentSessionName').textContent = s ? s.name : '会话';
    renderSessions();
    clearChat();
    addSystemMessage(`已切换到会话: ${s ? s.name : id}`);
  }
}

async function deleteSession(id) {
  if (!confirm('删除会话?')) return;
  await apiFetch('DELETE', `/api/sessions/${id}`);
  if (currentSessionId === id) {
    currentSessionId = 'default';
    $('currentSessionName').textContent = '默认会话';
  }
  loadSessions();
  clearChat();
}

async function forkSession(id) {
  const data = await apiFetch('POST', `/api/sessions/${id}/fork`);
  if (data.id) {
    currentSessionId = data.id;
    loadSessions();
    addSystemMessage(`已复制会话: ${data.name}`);
  }
}

async function exportCurrentSession() {
  const data = await apiFetch('GET', `/api/sessions/${currentSessionId}/export`);
  if (data.sessions) {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `neotrix-session-${currentSessionId}.json`;
    a.click();
  }
}

function showImportDialog() {
  showModal('导入会话', '<textarea id="importJsonInput" placeholder="粘贴 JSON..."></textarea>', '导入', async () => {
    const json = $('importJsonInput').value;
    if (!json) return;
    const data = await apiFetch('POST', '/api/sessions/import', {json});
    if (data.imported) {
      addSystemMessage(`✅ 导入了 ${data.imported.length} 个会话`);
      loadSessions();
    }
  });
}

function clearChat() {
  $('chatContainer').innerHTML = '';
  messages = [];
}

// ── Chat ──
async function sendMessage() {
  const input = $('promptInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  const sendBtn = $('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '思考中...';
  addSystemMessage('🧠 思考中...');
  try {
    const data = await apiFetch('POST', '/api/brain/reason', {prompt: text});
    const chatContainer = $('chatContainer');
    chatContainer.removeChild(chatContainer.lastChild);
    if (data.output) {
      addMessage('assistant', data.output);
    } else {
      addMessage('assistant', '⚠️ 无响应');
    }
  } catch(e) {
    const chatContainer = $('chatContainer');
    if (chatContainer.lastChild) chatContainer.removeChild(chatContainer.lastChild);
    addMessage('assistant', '❌ 错误: ' + e.message);
  }
  sendBtn.disabled = false;
  sendBtn.textContent = '发送';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Auto-resize textarea
$('promptInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Agent ──
async function loadAgentStatus() {
  const data = await apiFetch('GET', '/api/agent/status');
  const display = $('agentStatusDisplay');
  if (data.running) {
    display.innerHTML = `<span class="status-badge running">running · ${data.current_task || '无任务'} · ${data.uptime_secs}s</span>`;
  } else {
    display.innerHTML = `<span class="status-badge stopped">stopped</span>`;
  }
}

async function startAgent() {
  const input = $('promptInput');
  const prompt = input.value.trim() || 'general reasoning';
  await apiFetch('POST', '/api/agent/start', {prompt});
  loadAgentStatus();
  addSystemMessage('🤖 Agent started');
}

async function stopAgent() {
  await apiFetch('POST', '/api/agent/stop');
  loadAgentStatus();
  addSystemMessage('🛑 Agent stopped');
}

// ── Project / File Tree ──
async function loadFileTree() {
  const path = $('filePathInput').value.trim() || '.';
  const tree = $('fileTree');
  tree.innerHTML = '<p style="color:var(--text-secondary);font-size:12px;">加载中...</p>';
  const data = await apiFetch('GET', `/api/project/tree?path=${encodeURIComponent(path)}&depth=3`);
  if (Array.isArray(data)) {
    tree.innerHTML = renderTree(data);
  } else {
    tree.innerHTML = '<p style="color:var(--danger);font-size:12px;">无法加载目录</p>';
  }
}

function renderTree(nodes, depth = 0) {
  if (!nodes || nodes.length === 0) return '<p style="color:var(--text-secondary);font-size:12px;padding:4px;">(空)</p>';
  return nodes.map(n =>
    `<div class="file-item" onclick="${n.is_dir ? `loadFileTreePath('${escHtml(n.path)}')` : `openFile('${escHtml(n.path)}')`}">
      <span class="icon">${n.is_dir ? '📁' : '📄'}</span>
      <span class="name ${n.is_dir ? 'folder' : ''}">${escHtml(n.name)}</span>
    </div>`
    + (n.children ? `<div class="file-children">${renderTree(n.children, depth+1)}</div>` : '')
  ).join('');
}

function loadFileTreePath(path) {
  $('filePathInput').value = path;
  loadFileTree();
}

var currentFilePath = '';

async function openFile(path) {
  currentFilePath = path;
  const data = await apiFetch('GET', '/api/project/file?path=' + encodeURIComponent(path));
  if (data.content != null) {
    showModal('文件: ' + path.split('/').pop(), `<pre style="background:var(--bg-tertiary);padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;max-height:400px;">${escHtml(data.content)}</pre>`, '关闭');
  }
}

// ── Knowledge Sources ──
function loadKnowledgeSources() {
  const list = $('knowledgeSourceList');
  list.innerHTML = brainSources.map(s =>
    `<div class="knowledge-item" onclick="absorbSource('${s.name}')" style="cursor:pointer;">
      <div class="ks-name">${s.name}</div>
      <div class="ks-desc">${s.desc}</div>
    </div>`
  ).join('');
}

// ── MCP / Provider ──
async function loadMCPTools() {
  const list = $('mcpToolsList');
  const tools = [
    {name:'test_provider', desc:'测试 LLM provider 连接'},
    {name:'save_provider', desc:'保存 provider 配置到磁盘'},
    {name:'cli_command', desc:'执行任意 shell 命令'},
  ];
  list.innerHTML = tools.map(t =>
    `<div class="tool-item"><div class="tool-name">${t.name}</div><div class="tool-desc">${t.desc}</div></div>`
  ).join('');
}

async function saveProvider() {
  const config = {
    id: $('providerId').value,
    name: $('providerId').value,
    model: $('providerModel').value,
    api_key: $('providerKey').value,
    base_url: $('providerUrl').value || null,
    learning_rate: 0.01,
  };
  const data = await apiFetch('POST', '/api/mcp/save-provider', config);
  if (data.saved) addSystemMessage('✅ Provider config saved');
  else addSystemMessage('❌ Failed to save: ' + (data.error || 'unknown'));
}

async function testProvider() {
  const config = {
    id: $('providerId').value,
    name: $('providerId').value,
    model: $('providerModel').value,
    api_key: $('providerKey').value,
    base_url: $('providerUrl').value || null,
    learning_rate: 0.01,
  };
  addSystemMessage('🧪 Testing provider...');
  const data = await apiFetch('POST', '/api/mcp/test-provider', config);
  if (data.success) addSystemMessage('✅ Provider test passed');
  else addSystemMessage('❌ Provider test failed: ' + (data.error || 'unknown'));
}

// ── Tabs ──
function switchTab(name) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel-content').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
}

let rightVisible = true;

function toggleRightPanel() {
  rightVisible = !rightVisible;
  $('rightPanel').style.display = rightVisible ? '' : 'none';
}

// ── Modal ──
function showModal(title, bodyHtml, confirmText, onConfirm) {
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = bodyHtml;
  const btn = $('modalConfirm');
  btn.textContent = confirmText || '确认';
  btn.onclick = () => { if (onConfirm) onConfirm(); closeModal(); };
  $('modal').classList.add('active');
}

function showPrompt(title, defaultValue, onConfirm) {
  showModal(title, `<input id="promptInputModal" value="${escHtml(defaultValue)}" placeholder="输入...">`, '确认', () => {
    const val = $('promptInputModal').value;
    if (val) onConfirm(val);
  });
  setTimeout(() => { const el = $('promptInputModal'); if (el) el.focus(); }, 100);
}

function closeModal() {
  $('modal').classList.remove('active');
}

// ── Init ──
async function init() {
  await loadSessions();
  await loadBrainStats();
  loadKnowledgeSources();
  loadMCPTools();
  loadFileTree();
  loadAgentStatus();
  setInterval(loadBrainStats, 10000);
  setInterval(loadAgentStatus, 5000);
  addSystemMessage('🧠 NeoTrix Web UI 已启动');
  addSystemMessage('💡 输入消息开始对话，或浏览右侧面板查看文件/工具/设置');
}

init();
</script>
